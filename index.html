<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>カップル家計簿</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --p1: #E1F5EE; --p2: #5DCAA5; --p3: #1D9E75; --p4: #0F6E56;
    --s1: #FAEEDA; --s2: #EF9F27; --s3: #BA7517;
    --r1: #FCEBEB; --r2: #E24B4A;
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ebebea;
    --t1: #1a1a1a; --t2: #6b6b6b; --t3: #a8a8a6;
    --br: rgba(0,0,0,0.12);
    --brad-md: 8px; --brad-lg: 12px; --brad-xl: 16px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --t1: #f2f2f7; --t2: #aeaeb2; --t3: #636366;
      --br: rgba(255,255,255,0.12);
      --p1: #0a2e22; --p2: #1a6b50; --p3: #2db885; --p4: #6eddb5;
      --s1: #2e1f00; --s2: #f0a830; --s3: #fcc975;
      --r1: #2e0a0a; --r2: #ff6b6b;
    }
  }
  body { font-family: var(--font); background: var(--bg3); display: flex; justify-content: center; min-height: 100vh; }
  .app { width: 100%; max-width: 430px; min-height: 100vh; background: var(--bg3); display: flex; flex-direction: column; }

  /* Sync status */
  .sync-bar { background: var(--bg); border-bottom: 0.5px solid var(--br); padding: 6px 16px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--t3); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.online { background: var(--p3); }
  .sync-dot.syncing { background: var(--s2); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--r2); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .sync-label { font-size: 11px; color: var(--t3); flex: 1; }
  .room-code { font-size: 11px; color: var(--t2); font-weight: 600; letter-spacing: 1px; cursor: pointer; }

  /* Lang toggle */
  .lang-bar { background: var(--bg); border-bottom: 0.5px solid var(--br); padding: 6px 16px; display: flex; justify-content: flex-end; }
  .lang-toggle { display: flex; background: var(--bg2); border-radius: 20px; padding: 3px; gap: 2px; }
  .lang-btn { padding: 5px 14px; border-radius: 16px; border: none; background: none; font-size: 12px; font-family: var(--font); cursor: pointer; color: var(--t2); transition: all 0.15s; font-weight: 500; }
  .lang-btn.active { background: var(--bg); color: var(--t1); font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  .nav { display: flex; background: var(--bg); border-top: 0.5px solid var(--br); position: fixed; bottom: 0; width: 100%; max-width: 430px; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; padding: 10px 4px 8px; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--t3); font-size: 10px; font-family: var(--font); transition: color 0.15s; }
  .nav-btn.active { color: var(--p3); }
  .nav-btn svg { width: 22px; height: 22px; }
  .screens { flex: 1; overflow-y: auto; padding-bottom: 70px; }
  .screen { display: none; padding: 16px; }
  .screen.active { display: block; }

  /* Room setup overlay */
  .room-overlay { position: fixed; inset: 0; background: var(--bg3); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .room-overlay.hidden { display: none; }
  .room-card { background: var(--bg); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 360px; text-align: center; }
  .room-card h2 { font-size: 22px; font-weight: 700; color: var(--t1); margin-bottom: 6px; }
  .room-card p { font-size: 13px; color: var(--t2); margin-bottom: 24px; line-height: 1.6; }
  .room-divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
  .room-divider hr { flex: 1; border: none; border-top: 0.5px solid var(--br); }
  .room-divider span { font-size: 12px; color: var(--t3); }
  .room-input { width: 100%; padding: 13px 14px; border: 0.5px solid var(--br); border-radius: var(--brad-md); background: var(--bg2); font-size: 16px; font-family: var(--font); color: var(--t1); outline: none; text-align: center; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .room-input:focus { border-color: var(--p2); }
  .room-btn-create { width: 100%; padding: 14px; background: var(--p3); border: none; border-radius: var(--brad-lg); color: white; font-size: 15px; font-weight: 600; font-family: var(--font); cursor: pointer; margin-bottom: 10px; }
  .room-btn-join { width: 100%; padding: 14px; background: var(--bg2); border: 0.5px solid var(--br); border-radius: var(--brad-lg); color: var(--t1); font-size: 15px; font-weight: 600; font-family: var(--font); cursor: pointer; }

  .qa-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-top: 8px; }
  .qa-header h2 { font-size: 20px; font-weight: 600; color: var(--t1); }
  .who-toggle { display: flex; background: var(--bg2); border-radius: 20px; padding: 3px; gap: 2px; }
  .who-btn { padding: 7px 16px; border-radius: 16px; border: none; background: none; font-size: 13px; font-family: var(--font); cursor: pointer; color: var(--t2); transition: all 0.15s; }
  .who-btn.active { background: var(--bg); color: var(--t1); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  .date-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
  .date-label { font-size: 13px; color: var(--t2); flex-shrink: 0; }
  .date-btn { flex: 1; padding: 12px 14px; background: var(--bg2); border: 0.5px solid var(--br); border-radius: var(--brad-md); font-size: 14px; font-family: var(--font); color: var(--t1); cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; -webkit-tap-highlight-color: transparent; }
  .date-btn:active { background: var(--bg3); }
  .today-btn { padding: 12px 14px; background: var(--bg2); border: 0.5px solid var(--br); border-radius: var(--brad-md); font-size: 12px; font-family: var(--font); color: var(--p3); font-weight: 600; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }

  .amount-native-wrap { position: relative; margin-bottom: 14px; }
  .amount-currency { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--t2); pointer-events: none; font-weight: 500; }
  .amount-native { width: 100%; padding: 15px 14px 15px 34px; border: 0.5px solid var(--br); border-radius: var(--brad-md); background: var(--bg2); font-size: 24px; font-family: var(--font); font-weight: 600; color: var(--t1); outline: none; -webkit-appearance: none; appearance: none; }
  .amount-native:focus { border-color: var(--p2); background: var(--bg); }
  .amount-native::placeholder { color: var(--t3); font-weight: 400; font-size: 16px; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .cats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .cat-chip { padding: 8px 13px; border-radius: 20px; border: 0.5px solid var(--br); background: var(--bg2); font-size: 13px; color: var(--t2); cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: var(--font); }
  .cat-chip.active { background: var(--p1); border-color: var(--p2); color: var(--p4); font-weight: 600; }
  .memo-input { width: 100%; padding: 12px 14px; border: 0.5px solid var(--br); border-radius: var(--brad-md); background: var(--bg2); font-size: 14px; font-family: var(--font); color: var(--t1); margin-bottom: 14px; outline: none; }
  .memo-input:focus { border-color: var(--p2); }
  .add-btn { width: 100%; padding: 15px; background: var(--p3); border: none; border-radius: var(--brad-lg); color: white; font-size: 16px; font-weight: 600; font-family: var(--font); cursor: pointer; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
  .add-btn:active { background: var(--p4); }

  /* Calendar */
  .cal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.22s; }
  .cal-overlay.open { opacity: 1; pointer-events: all; }
  .cal-sheet { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-width: 430px; padding: 20px 16px calc(24px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); }
  .cal-overlay.open .cal-sheet { transform: translateY(0); }
  .cal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-nav { display: flex; gap: 8px; align-items: center; }
  .cal-nav-btn { background: var(--bg2); border: none; border-radius: 8px; padding: 7px 12px; font-size: 16px; cursor: pointer; color: var(--t1); }
  .cal-month-label { font-size: 16px; font-weight: 600; color: var(--t1); min-width: 110px; text-align: center; }
  .cal-close { background: var(--bg2); border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-family: var(--font); color: var(--t2); cursor: pointer; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; }
  .cal-wd { text-align: center; font-size: 11px; color: var(--t3); font-weight: 600; padding: 6px 0; }
  .cal-wd:first-child { color: #E24B4A; }
  .cal-wd:last-child { color: #378ADD; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 15px; border-radius: 50%; cursor: pointer; border: none; background: none; font-family: var(--font); color: var(--t1); -webkit-tap-highlight-color: transparent; transition: background 0.1s; }
  .cal-day:active:not(.empty) { background: var(--bg2); }
  .cal-day.empty { cursor: default; pointer-events: none; }
  .cal-day.today { font-weight: 700; color: var(--p3); }
  .cal-day.selected { background: var(--p3) !important; color: white !important; font-weight: 600; }
  .cal-day.sunday { color: #E24B4A; }
  .cal-day.saturday { color: #378ADD; }
  .cal-day.selected.sunday, .cal-day.selected.saturday { color: white !important; }


  /* Dashboard */

  .settle-hero { background: var(--bg); border-radius: var(--brad-xl); padding: 24px 18px; margin-bottom: 12px; border: 0.5px solid var(--br); text-align: center; }
  .settle-hero-label { font-size: 12px; color: var(--t3); margin-bottom: 8px; font-weight: 500; }
  .settle-hero-amount { font-size: 38px; font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; color: var(--t1); }
  .settle-hero-amount.positive { color: var(--p3); }
  .settle-hero-amount.negative { color: var(--r2); }
  .settle-hero-sub { font-size: 13px; color: var(--t2); line-height: 1.5; }
  .summary-card { background: var(--bg); border-radius: var(--brad-xl); padding: 18px; margin-bottom: 12px; border: 0.5px solid var(--br); }
  .balance-row { display: flex; justify-content: space-between; align-items: center; }
  .person-stat { text-align: center; flex: 1; }
  .person-name { font-size: 12px; color: var(--t2); margin-bottom: 4px; }
  .person-amount { font-size: 22px; font-weight: 600; color: var(--t1); letter-spacing: -0.5px; }
  .person-dot { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto 5px; }
  .dot-a { background: var(--p3); }
  .dot-b { background: var(--s2); }
  .divider-v { width: 0.5px; background: var(--br); height: 55px; }
  .settle-box { margin-top: 14px; padding-top: 14px; border-top: 0.5px solid var(--br); text-align: center; }
  .settle-label { font-size: 12px; color: var(--t3); margin-bottom: 5px; }
  .settle-amount { font-size: 15px; font-weight: 600; }
  .settle-amount.positive { color: var(--p3); }
  .settle-amount.negative { color: var(--r2); }
  .bar-section { background: var(--bg); border-radius: var(--brad-lg); padding: 14px; margin-bottom: 12px; border: 0.5px solid var(--br); }
  .bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--t2); margin-bottom: 8px; }
  .bar-track { height: 10px; background: var(--bg2); border-radius: 5px; overflow: hidden; display: flex; }
  .bar-fill-a { background: var(--p3); border-radius: 5px; transition: width 0.5s ease; }
  .bar-fill-b { background: var(--s2); border-radius: 5px; transition: width 0.5s ease; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric { background: var(--bg); border-radius: var(--brad-lg); padding: 14px; border: 0.5px solid var(--br); }
  .metric-label { font-size: 11px; color: var(--t3); margin-bottom: 5px; }
  .metric-val { font-size: 18px; font-weight: 600; color: var(--t1); letter-spacing: -0.5px; }
  .section-title { font-size: 13px; color: var(--t2); font-weight: 600; margin-bottom: 8px; }
  .cat-breakdown { background: var(--bg); border-radius: var(--brad-lg); border: 0.5px solid var(--br); overflow: hidden; margin-bottom: 12px; }
  .cat-row { display: flex; align-items: center; padding: 12px 14px; border-bottom: 0.5px solid var(--br); gap: 10px; }
  .cat-row:last-child { border-bottom: none; }
  .cat-bar-wrap { width: 60px; height: 4px; background: var(--bg2); border-radius: 2px; overflow: hidden; }
  .cat-bar-fill { height: 4px; background: var(--p3); border-radius: 2px; }
  .cat-amt { font-size: 13px; font-weight: 600; color: var(--t1); min-width: 70px; text-align: right; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--t3); font-size: 14px; line-height: 1.8; }

  /* History */
  .hist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-top: 8px; }
  .hist-header h2 { font-size: 20px; font-weight: 600; color: var(--t1); }
  .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip { padding: 7px 13px; border-radius: 20px; border: 0.5px solid var(--br); background: var(--bg2); font-size: 12px; color: var(--t2); cursor: pointer; white-space: nowrap; font-family: var(--font); transition: all 0.15s; }
  .filter-chip.active { background: var(--p1); border-color: var(--p2); color: var(--p4); font-weight: 600; }
  .tx-list { display: flex; flex-direction: column; gap: 6px; }
  .tx-item { background: var(--bg); border: 0.5px solid var(--br); border-radius: var(--brad-lg); padding: 12px 14px; display: flex; align-items: center; gap: 12px; -webkit-tap-highlight-color: transparent; }
  .tx-item:active { background: var(--bg2); }
  .tx-icon { width: 40px; height: 40px; border-radius: var(--brad-md); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .tx-body { flex: 1; min-width: 0; }
  .tx-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
  .tx-memo { font-size: 14px; color: var(--t1); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
  .tx-amount { font-size: 14px; font-weight: 600; color: var(--t1); }
  .tx-bot { display: flex; justify-content: space-between; align-items: center; }
  .tx-meta { font-size: 11px; color: var(--t3); }
  .tx-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .badge-a { background: var(--p1); color: var(--p4); }
  .badge-b { background: var(--s1); color: var(--s3); }
  .date-header { font-size: 12px; color: var(--t3); font-weight: 600; margin: 14px 0 6px; padding-left: 2px; }

  /* Settings */
  .settings-header { padding-top: 8px; margin-bottom: 20px; }
  .settings-header h2 { font-size: 20px; font-weight: 600; color: var(--t1); }
  .settings-section { margin-bottom: 20px; }
  .settings-title { font-size: 11px; color: var(--t3); font-weight: 600; margin-bottom: 8px; padding-left: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
  .settings-card { background: var(--bg); border: 0.5px solid var(--br); border-radius: var(--brad-lg); overflow: hidden; }
  .settings-row { display: flex; align-items: center; padding: 13px 14px; border-bottom: 0.5px solid var(--br); gap: 12px; }
  .settings-row:last-child { border-bottom: none; }
  .settings-icon { width: 34px; height: 34px; border-radius: var(--brad-md); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .icon-green { background: var(--p1); } .icon-amber { background: var(--s1); } .icon-blue { background: #E6F1FB; }
  .settings-label { flex: 1; font-size: 14px; color: var(--t1); }
  .settings-value { font-size: 13px; color: var(--t2); }
  .settings-input { border: none; background: none; font-size: 14px; font-family: var(--font); color: var(--t1); text-align: right; width: 130px; outline: none; }
  .cat-manage { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 14px; }
  .cat-tag { display: flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: 16px; border: 0.5px solid var(--br); background: var(--bg2); font-size: 12px; color: var(--t1); }
  .cat-del { background: none; border: none; cursor: pointer; color: var(--t3); font-size: 16px; line-height: 1; padding: 0; }
  .add-cat-row { display: flex; gap: 8px; padding: 0 14px 12px; }
  .add-cat-emoji { width: 42px; padding: 8px; border: 0.5px solid var(--br); border-radius: var(--brad-md); background: var(--bg2); font-size: 16px; text-align: center; font-family: var(--font); outline: none; }
  .add-cat-input { flex: 1; padding: 8px 12px; border: 0.5px solid var(--br); border-radius: var(--brad-md); background: var(--bg2); font-size: 13px; font-family: var(--font); color: var(--t1); outline: none; }
  .add-cat-btn { padding: 8px 14px; background: var(--p3); border: none; border-radius: var(--brad-md); color: white; font-size: 13px; font-family: var(--font); cursor: pointer; font-weight: 600; }
  .danger-label { color: var(--r2) !important; cursor: pointer; }
  .room-code-display { font-size: 22px; font-weight: 700; letter-spacing: 4px; color: var(--p3); background: var(--p1); padding: 10px 16px; border-radius: var(--brad-md); text-align: center; }

  .toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--t1); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 1000; white-space: nowrap; font-family: var(--font); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loading-screen { position: fixed; inset: 0; background: var(--bg3); z-index: 400; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .loading-screen.hidden { display: none; }
  .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--br); border-top-color: var(--p3); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--t2); font-family: var(--font); }
</style>
</head>
<body>
<div class="app">

  <!-- Loading -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">接続中...</div>
  </div>

  <!-- Room setup -->
  <div class="room-overlay hidden" id="room-overlay">
    <div class="room-card">
      
      <p id="room-desc">ルームを作るか、パートナーのコードで参加してください</p>
      <button class="room-btn-create" onclick="createRoom()" id="btn-create">✨ 新しいルームを作る</button>
      <div class="room-divider"><hr><span id="room-or">または</span><hr></div>
      <input class="room-input" id="room-code-input" placeholder="コードを入力" maxlength="6">
      <button class="room-btn-join" onclick="joinRoom()" id="btn-join">参加する</button>
    </div>
  </div>

  <!-- Sync bar -->
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span class="sync-label" id="sync-label">接続中...</span>
    <span class="room-code" id="room-code-display" onclick="copyRoomCode()"></span>
  </div>

  <!-- Lang bar -->
  <div class="lang-bar">
    <div class="lang-toggle">
      <button class="lang-btn" id="lang-ko" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn active" id="lang-ja" onclick="setLang('ja')">日本語</button>
    </div>
  </div>

  <div class="screens">
    <!-- ADD -->
    <div id="screen-add" class="screen active">
      <div class="qa-header">
        <h2 data-i18n="addTitle">지출 추가</h2>
        <div class="who-toggle">
          <button class="who-btn active" onclick="setWho('A')" id="who-a">나</button>
          <button class="who-btn" onclick="setWho('B')" id="who-b">파트너</button>
        </div>
      </div>
      <div class="date-row">
        <span class="date-label" data-i18n="dateLabel">📅 날짜</span>
        <button class="date-btn" onclick="openCal()">
          <span id="date-display-text"></span>
          <span style="color:var(--t3);font-size:16px;">›</span>
        </button>

function fmt(n) { return t('currency') + Math.round(n).toLocaleString(); }

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + status;
  if (status==='online') label.textContent = t('syncOnline');
  else if (status==='offline') label.textContent = t('syncOffline');
  else if (status==='error') label.textContent = t('syncError');
  else label.textContent = t('connectingMsg');
}

// ── Room ──────────────────────────────────────────────
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i=0; i<6; i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

window.createRoom = async function() {
  const code = genCode();
  document.getElementById('loading-text').textContent = t('roomCreate');
  document.getElementById('loading-screen').classList.remove('hidden');
  document.getElementById('room-overlay').classList.add('hidden');
  try {
    await set(ref(db, `rooms/${code}/meta`), {
      created: Date.now(),
      catsKo: state.catsKo,
      catsJa: state.catsJa,
      nickA: '', nickB: '',
    });
    state.roomCode = code;
    localStorage.setItem('cl_room', code);
    startListening();
  } catch(e) {
    setSyncStatus('error');
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('room-overlay').classList.remove('hidden');
  }
};

window.joinRoom = async function() {
  const code = document.getElementById('room-code-input').value.trim().toUpperCase();
  if (code.length < 4) return;
  document.getElementById('loading-text').textContent = t('connectingMsg');
  document.getElementById('loading-screen').classList.remove('hidden');
  try {
    const snap = await get(ref(db, `rooms/${code}/meta`));
    if (!snap.exists()) {
      showToast(t('roomJoinFail'));
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('room-overlay').classList.remove('hidden');
      return;
    }
    state.roomCode = code;
    localStorage.setItem('cl_room', code);
    document.getElementById('room-overlay').classList.add('hidden');
    startListening();
  } catch(e) {
    setSyncStatus('error');
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('room-overlay').classList.remove('hidden');
  }
};

window.leaveRoom = function() {
  if (!confirm(t('confirmLeave'))) return;
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  state.roomCode = null;
  state.txs = [];
  localStorage.removeItem('cl_room');
  document.getElementById('room-overlay').classList.remove('hidden');
};

window.copyRoomCode = function() {
  if (!state.roomCode) return;
  navigator.clipboard.writeText(state.roomCode).then(() => showToast(t('toastCodeCopied'))).catch(()=>{});
};

function startListening() {
  if (unsubscribe) { unsubscribe(); }
  setSyncStatus('syncing');
  const roomRef = ref(db, `rooms/${state.roomCode}`);
  const unsub = onValue(roomRef, (snap) => {
    const data = snap.val() || {};
    // load txs
    state.txs = Object.entries(data.txs || {}).map(([id, v]) => ({...v, id})).sort((a,b) => new Date(b.date)-new Date(a.date));
    // load meta
    if (data.meta) {
      if (data.meta.catsKo) state.catsKo = data.meta.catsKo;
      if (data.meta.catsJa) state.catsJa = data.meta.catsJa;
      if (data.meta.nickA !== undefined) state.nickA = data.meta.nickA;
      if (data.meta.nickB !== undefined) state.nickB = data.meta.nickB;
    }
    setSyncStatus('online');
    document.getElementById('loading-screen').classList.add('hidden');
    // update room code displays
    document.getElementById('room-code-display').textContent = state.roomCode;
    const rs = document.getElementById('room-code-setting');
    if (rs) rs.textContent = state.roomCode;
    // refresh active screen
    refreshActiveScreen();
    setWho(state.currentWho);
    renderCatSelector();
    applyI18n();
  }, (err) => {
    setSyncStatus('error');
  });
  unsubscribe = () => unsub();
}

async function fbSaveMeta() {
  if (!state.roomCode) return;
  await update(ref(db, `rooms/${state.roomCode}/meta`), {
    catsKo: state.catsKo,
    catsJa: state.catsJa,
    nickA: state.nickA||'',
    nickB: state.nickB||'',
  });
}

  applyI18n();
  document.getElementById('currency-symbol').textContent = t('currency');
  document.getElementById('amount-native').placeholder = t('amountPlaceholder');
  document.getElementById('memo-input').placeholder = t('memoPH');
  document.getElementById('new-cat-input').placeholder = t('catInputPH');
  setWho(state.currentWho);
  renderCatSelector();
  updateDateDisplay();
  renderCalWeekdays();
  setSyncStatus(document.getElementById('sync-dot').classList.contains('online')?'online':'syncing');
  refreshActiveScreen();
};
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = I18N[state.lang][key];
    if (val && typeof val==='string') el.textContent = val;
  });
  const cnt = document.getElementById('tx-count');
  if (cnt) cnt.textContent = state.txs.length + t('txCountSuffix');
}

// ── Who ───────────────────────────────────────────────
window.setWho = function(w) {
  state.currentWho = w;
  document.getElementById('who-a').classList.toggle('active', w==='A');
  document.getElementById('who-b').classList.toggle('active', w==='B');
  document.getElementById('who-a').textContent = state.nickA || (state.lang==='ko'?'나':'自分');
  document.getElementById('who-b').textContent = state.nickB || (state.lang==='ko'?'파트너':'パートナー');
};

// ── Date ──────────────────────────────────────────────
function fmtDate(d) {
  const diff = (todayNorm - new Date(d.getFullYear(), d.getMonth(), d.getDate())) / 86400000;
  if (diff===0) return t('today');
  if (diff===1) return t('yesterday');
  if (diff===-1) return t('tomorrow');
  return state.lang==='ja' ? `${d.getMonth()+1}月${d.getDate()}日` : `${d.getMonth()+1}월 ${d.getDate()}일`;
}
function updateDateDisplay() {
  document.getElementById('date-display-text').textContent = fmtDate(state.selectedDate);
}
window.setToday = function() {
  state.selectedDate = new Date(todayNorm);
  state.calSelected = new Date(todayNorm);
  state.calYear = todayD.getFullYear(); state.calMonth = todayD.getMonth();
  updateDateDisplay();
};

// ── Calendar ──────────────────────────────────────────
window.openCal = function() {
  state.calSelected = new Date(state.selectedDate);
  state.calYear = state.selectedDate.getFullYear();
  state.calMonth = state.selectedDate.getMonth();
  renderCalWeekdays(); renderCal();
  document.getElementById('cal-overlay').classList.add('open');
};
window.closeCal = function() { document.getElementById('cal-overlay').classList.remove('open'); };
window.calOverlayClick = function(e) { if (e.target===document.getElementById('cal-overlay')) closeCal(); };
window.confirmDate = function() { state.selectedDate=new Date(state.calSelected); updateDateDisplay(); closeCal(); };
window.calMove = function(d) {
  state.calMonth+=d;
  if(state.calMonth>11){state.calMonth=0;state.calYear++;}
  if(state.calMonth<0){state.calMonth=11;state.calYear--;}
  renderCal();
};
window.calSelectDay = function(y,m,d) {
  state.calSelected = new Date(y,m,d);
  state.selectedDate = new Date(y,m,d);
  updateDateDisplay();
  closeCal();
};
function renderCalWeekdays() {
  document.getElementById('cal-weekdays').innerHTML = t('weekdays').map(w=>`<div class="cal-wd">${w}</div>`).join('');
}
function renderCal() {
  const mths=t('months');
  document.getElementById('cal-title').textContent = state.lang==='ja'
    ? `${state.calYear}年 ${mths[state.calMonth]}`
    : `${state.calYear}년 ${mths[state.calMonth]}`;
  const firstDay=new Date(state.calYear,state.calMonth,1).getDay();
  const daysInMonth=new Date(state.calYear,state.calMonth+1,0).getDate();
  let html='';
  for(let i=0;i<firstDay;i++) html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(state.calYear,state.calMonth,d);
    const dow=date.getDay();
    const isToday=date.getTime()===todayNorm.getTime();
    const isSel=state.calSelected&&date.getTime()===new Date(state.calSelected.getFullYear(),state.calSelected.getMonth(),state.calSelected.getDate()).getTime();
    const cls=['cal-day',dow===0?'sunday':'',dow===6?'saturday':'',isToday?'today':'',isSel?'selected':''].filter(Boolean).join(' ');
    html+=`<button class="${cls}" onclick="calSelectDay(${state.calYear},${state.calMonth},${d})">${d}</button>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

// ── Categories ────────────────────────────────────────
function renderCatSelector() {
  document.getElementById('cat-selector').innerHTML = getCats().map(c=>
    `<button class="cat-chip${state.currentCat===c.id?' active':''}" onclick="selectCat('${c.id}')">${c.label}</button>`
  ).join('');
}
window.selectCat = function(id) { state.currentCat=id; renderCatSelector(); };

// ── Add ───────────────────────────────────────────────
window.addTransaction = async function() {
  const amt=parseInt(document.getElementById('amount-native').value||'0');
  if(amt<=0){
    const el=document.getElementById('amount-native');
    el.style.borderColor='var(--r2)';
    setTimeout(()=>{el.style.borderColor='';},600);
    showToast(t('toastNoAmt')); return;
  }
  const cats=getCats();
  const cat=cats.find(c=>c.id===state.currentCat)||cats[0];
  const memo=document.getElementById('memo-input').value.trim()||cat.label;
  const tx={who:state.currentWho, amount:amt, cat:cat.id, memo, date:new Date(state.selectedDate).toISOString()};
  if (state.roomCode) {
    await push(ref(db, `rooms/${state.roomCode}/txs`), tx);
  }
  document.getElementById('amount-native').value='';
  document.getElementById('memo-input').value='';
  showToast(t('toastAdded')(fmt(amt)));
};

// ── Dashboard ─────────────────────────────────────────

function renderDash() {
  // title
  const titleEl = document.getElementById('dash-main-title');
  if (titleEl) titleEl.textContent = state.lang==='ja' ? '収支サマリー' : '전체 정산';

  const txs = state.txs; // ALL transactions, no month filter
  const totA = txs.filter(tx=>tx.who==='A').reduce((s,tx)=>s+tx.amount,0);
  const totB = txs.filter(tx=>tx.who==='B').reduce((s,tx)=>s+tx.amount,0);
  const total = totA+totB;
  const half = total/2;
  const diff = totA-half; // positive = A paid more = B owes A
  const nickA = state.nickA||(state.lang==='ko'?'나':'自分');
  const nickB = state.nickB||(state.lang==='ko'?'파트너':'パートナー');
  const pctA = total>0?(totA/total*100):50;
  const pctB = total>0?(totB/total*100):50;

  const catSums={};
  txs.forEach(tx=>{catSums[tx.cat]=(catSums[tx.cat]||0)+tx.amount;});
  const catRows=Object.entries(catSums).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxCat=catRows.length>0?catRows[0][1]:1;

  let settleText='', settleClass='', settleSubText='';
  if(Math.abs(diff)<100){
    settleText = state.lang==='ja' ? '精算なし' : '정산 없음';
    settleSubText = state.lang==='ja' ? '均等に分担できています' : '균등하게 분담되고 있어요';
  } else if(diff>0){
    settleText = fmt(diff);
    settleSubText = state.lang==='ja' ? `${nickB}が${nickA}に支払う累計金額` : `${nickB}가 ${nickA}에게 보낼 누적 금액`;
    settleClass='negative';
  } else {
    settleText = fmt(-diff);
    settleSubText = state.lang==='ja' ? `${nickA}が${nickB}に支払う累計金額` : `${nickA}가 ${nickB}에게 보낼 누적 금액`;
    settleClass='positive';
  }
 <style>
  .negative { color: #FF8A00; }

  const cats=getCats();

  // monthly breakdown
  const monthMap={};
  txs.forEach(tx=>{
    const d=new Date(tx.date);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!monthMap[key]) monthMap[key]={A:0,B:0};
    monthMap[key][tx.who]+=tx.amount;
  });
  const monthRows=Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);

  document.getElementById('dash-content').innerHTML = txs.length===0
    ? `<div class="empty-state">${(state.lang==='ja'?'取引がまだありません\n支出追加タブから入力してください ✍️':'거래 내역이 없어요\n지출 추가 탭에서 내역을 추가해보세요 ✍️').replace('\n','<br>')}</div>`
    : `
    <!-- Big settle card -->
    <div class="settle-hero">
      <div class="settle-hero-label">${state.lang==='ja'?'累計精算額':'누적 정산 금액'}</div>
      <div class="settle-hero-amount ${settleClass}">${settleText}</div>
      <div class="settle-hero-sub">${settleSubText}</div>
    </div>

    <!-- Who paid what -->
    <div class="summary-card">
      <div class="balance-row">
        <div class="person-stat"><div class="person-dot dot-a"></div><div class="person-name">${t('paidBy')(nickA)}</div><div class="person-amount">${fmt(totA)}</div></div>
        <div class="divider-v"></div>
        <div class="person-stat"><div class="person-dot dot-b"></div><div class="person-name">${t('paidBy')(nickB)}</div><div class="person-amount">${fmt(totB)}</div></div>
      </div>
    </div>

    <!-- Bar -->
    <div class="bar-section">
      <div class="bar-label"><span>🟢 ${nickA} ${Math.round(pctA)}%</span><span>${Math.round(pctB)}% ${nickB} 🟡</span></div>
      <div class="bar-track"><div class="bar-fill-a" style="width:${pctA}%"></div><div class="bar-fill-b" style="width:${pctB}%"></div></div>
    </div>

    <!-- Metrics -->
    <div class="metrics">
      <div class="metric"><div class="metric-label">${t('totalSpend')}</div><div class="metric-val">${fmt(total)}</div></div>
      <div class="metric"><div class="metric-label">${t('perPerson')}</div><div class="metric-val">${fmt(half)}</div></div>
      <div class="metric"><div class="metric-label">${t('txCountStat')}</div><div class="metric-val">${txs.length}${t('txCountSuffix')}</div></div>
      <div class="metric"><div class="metric-label">${t('avgPerTx')}</div><div class="metric-val">${fmt(txs.length>0?total/txs.length:0)}</div></div>
    </div>

    <!-- Monthly breakdown -->
    ${monthRows.length>0?`
    <div class="section-title">${state.lang==='ja'?'月別内訳':'월별 내역'}</div>
    <div class="cat-breakdown">
      ${monthRows.map(([ym,v])=>{
        const [y,m]=ym.split('-');
        const label=state.lang==='ja'?`${y}年${parseInt(m)}月`:`${y}년 ${parseInt(m)}월`;
        const mTotal=(v.A||0)+(v.B||0);
        const mDiff=(v.A||0)-(mTotal/2);
        let arrow='', arrowColor='var(--t3)';
        if(Math.abs(mDiff)>=100){
          arrow=mDiff>0?`▲ ${fmt(mDiff)}`:`▼ ${fmt(-mDiff)}`;
          arrowColor=mDiff>0?'var(--p3)':'var(--r2)';
        }
        return `<div class="cat-row">
          <span style="font-size:14px;color:var(--t1);flex:1;font-weight:500">${label}</span>
          <span style="font-size:12px;color:var(--t3);margin-right:8px">${fmt(mTotal)}</span>
          <span style="font-size:12px;font-weight:600;color:${arrowColor}">${arrow||'±0'}</span>
        </div>`;
      }).join('')}
    </div>`:'' }

    <!-- Cat breakdown -->
    ${catRows.length>0?`<div class="section-title">${t('catBreakdown')}</div>
    <div class="cat-breakdown">${catRows.map(([catId,amt])=>{
      const cat=cats.find(c=>c.id===catId)||{icon:'📦',label:catId,color:'#eee'};
      return `<div class="cat-row"><div class="tx-icon" style="background:${cat.color||'#eee'}">${cat.icon||'📦'}</div><span style="font-size:14px;color:var(--t1);flex:1">${cat.label}</span><div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${Math.round(amt/maxCat*100)}%"></div></div><span class="cat-amt">${fmt(amt)}</span></div>`;
    }).join('')}</div>`:''}
  `;
}

window.setFilter = function(f){state.histFilter=f;renderHist();};

// ── Settings ──────────────────────────────────────────
function renderSettings() {
  const cats=getCats();
  document.getElementById('nick-a').value=state.nickA||(state.lang==='ko'?'나':'自分');
  document.getElementById('nick-b').value=state.nickB||(state.lang==='ko'?'파트너':'パートナー');
  document.getElementById('tx-count').textContent=state.txs.length+t('txCountSuffix');
  document.getElementById('cat-manage').innerHTML=cats.map(c=>`<div class="cat-tag">${c.label} <button class="cat-del" onclick="delCat('${c.id}')">×</button></div>`).join('');
  const rs=document.getElementById('room-code-setting');
  if(rs) rs.textContent=state.roomCode||'';
  applyI18n();
}
window.saveNick = async function(){
  state.nickA=document.getElementById('nick-a').value;
  state.nickB=document.getElementById('nick-b').value;
  await fbSaveMeta();
  setWho(state.currentWho);
};
window.addCat = async function(){
  const emoji=document.getElementById('new-cat-emoji').value.trim()||'🏷';
  const name=document.getElementById('new-cat-input').value.trim();
  if(!name) return;
  const colors=['#E1F5EE','#E6F1FB','#EAF3DE','#FAEEDA','#FBEAF0','#F1EFE8','#EEEDFE'];
  const entry={id:'cat_'+Date.now(),label:emoji+' '+name,icon:emoji,color:colors[getCats().length%colors.length]};
  state.catsKo.push({...entry});
  state.catsJa.push({...entry});
  document.getElementById('new-cat-emoji').value='';
  document.getElementById('new-cat-input').value='';
  await fbSaveMeta();
  showToast(t('toastCatAdded'));
};
window.delCat = async function(id){
  if(getCats().length<=1){showToast(t('toastCatMin'));return;}
  state.catsKo=state.catsKo.filter(c=>c.id!==id);
  state.catsJa=state.catsJa.filter(c=>c.id!==id);
  if(state.currentCat===id) state.currentCat=getCats()[0].id;
  await fbSaveMeta();
};
window.clearData = async function(){
  if(!confirm(t('confirmClear'))) return;
  if(state.roomCode) await set(ref(db,`rooms/${state.roomCode}/txs`), null);
  showToast(t('toastCleared'));
};

// ── Navigation ────────────────────────────────────────
window.showScreen = function(s){
  ['add','dash','hist','settings'].forEach(id=>{
    document.getElementById('screen-'+id).classList.toggle('active',id===s);
    document.getElementById('nav-'+id).classList.toggle('active',id===s);
  });
  if(s==='dash') renderDash();
  if(s==='hist') renderHist();
  if(s==='settings') renderSettings();
};
function refreshActiveScreen(){
  if(document.getElementById('screen-dash').classList.contains('active')) renderDash();
  else if(document.getElementById('screen-hist').classList.contains('active')) renderHist();
  else if(document.getElementById('screen-settings').classList.contains('active')) renderSettings();
}

// ── Init ──────────────────────────────────────────────
function init(){
  setLang(state.lang);
  renderCatSelector();
  setWho('A');
  updateDateDisplay();
  renderCalWeekdays();
  if(state.roomCode){
    startListening();
  } else {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('room-overlay').classList.remove('hidden');
  }
}
init();
</script>
</body>
</html>
